services:
  - type: web
    name: reply-mcp
    env: node
    plan: free
    rootDir: reply-mcp
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5001
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: NVIDIA_API_KEY
        sync: false
      - key: MCP_SHARED_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: replymate_ai
      - key: MONGODB_TODOS_COLLECTION
        value: todos
      - key: MONGODB_EXPENSES_COLLECTION
        value: expenses
      - key: MONGODB_WATCH_COLLECTION
        value: watch_tracker
